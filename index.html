<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de dés</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <!-- Création Joueurs / boutons et scores-->
    <div id="player1">
        <h2>Joueur 1</h2>
        <div id="dice1">1</div>
        <button id="roll-button-1">Lancer</button>
        <button id="keep-button-1">Garder</button>
        <button id="new-turn-button-1">Nouveau tour</button>
        <p>Score courant : <span id="current-score-1">0</span></p>
        <p>Score total : <span id="total-score-1">0</span></p>
    </div>

    <div id="player2">
        <h2>Joueur 2</h2>
        <div id="dice2">1</div>
        <button id="roll-button-2">Lancer</button>
        <button id="keep-button-2">Garder</button>
        <button id="new-turn-button-2">Nouveau tour</button>
        <p>Score courant : <span id="current-score-2">0</span></p>
        <p>Score total : <span id="total-score-2">0</span></p>
    </div>
  
    <script src="scripts.js"></script>
</body>
</html>
