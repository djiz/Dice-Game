<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de dés</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <h1>Le jeu de Dés</h1>

    <!-- Création Joueurs / boutons et scores-->
    <div class="container player1" id="player1">
        <div class="player">
            <h2>Joueur 1</h2>
        </div>
        <div class="dice" id="dice1">1</div>
        <button class="roll-button button" id="roll-button-1">Lancer</button>
        <button class="keep-button button" id="keep-button-1" disabled>Garder</button>
        <p>Score courant : <span id="current-score-1">0</span></p>
        <p>Score total : <span id="total-score-1">0</span></p>
    </div>

    <div class="container player2" id="player2">
        <div class="player">
            <h2>Joueur 2</h2>
        </div>
        <div class="dice" id="dice2">1</div>
        <button class="roll-button button" id="roll-button-2">Lancer</button>
        <button class="keep-button button" id="keep-button-2" disabled>Garder</button>
        <p>Score courant : <span id="current-score-2">0</span></p>
        <p>Score total : <span id="total-score-2">0</span></p>
    </div>

    <button class="new-game-button button" id="new-turn-button" disabled>Nouveau tour</button>
  
    <script src="scripts.js"></script>
</body>
</html>
